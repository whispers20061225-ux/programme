qwen_semantic_node:
  ros__parameters:
    prompt_topic: "/qwen/user_prompt"
    semantic_task_topic: "/qwen/semantic_task"
    semantic_result_topic: "/qwen/semantic_result"
    color_topic: "/camera/camera/color/image_raw"
    enabled: true
    use_visual_context: false
    auto_infer_on_start: true
    model_endpoint: "http://127.0.0.1:8000/v1/chat/completions"
    model_name: "Qwen/Qwen2.5-VL-3B-Instruct-AWQ"
    api_key: "EMPTY"
    request_timeout_sec: 20.0
    max_inference_rate_hz: 0.5
    temperature: 0.0
    max_tokens: 256
    resize_max_side_px: 1024
    jpeg_quality: 90
    default_task: "pick"
    default_target_hint: "blue cylinder"
    default_constraints: ["parallel_gripper"]
    default_prompt: "Understand the operator's language input and convert it into a structured robotic pick task."
    log_interval_sec: 10.0

detector_seg_node:
  ros__parameters:
    color_topic: "/camera/camera/color/image_raw"
    semantic_task_topic: "/qwen/semantic_task"
    detection_result_topic: "/perception/detection_result"
    candidate_visible_topic: "/sim/perception/target_candidate_visible"
    enabled: true
    backend: "disabled"
    backend_url: ""
    request_timeout_sec: 10.0
    max_inference_rate_hz: 2.0
    jpeg_quality: 90
    resize_max_side_px: 1024
    log_interval_sec: 10.0

cloud_filter_node:
  ros__parameters:
    detection_result_topic: "/perception/detection_result"
    depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/camera/aligned_depth_to_color/camera_info"
    target_cloud_topic: "/perception/target_cloud"
    target_pose_topic: "/sim/perception/target_pose"
    target_locked_topic: "/sim/perception/target_locked"
    candidate_visible_topic: "/sim/perception/target_candidate_visible"
    debug_topic: "/perception/target_cloud_debug"
    target_frame: "world"
    enabled: true
    publish_rate_hz: 4.0
    detection_stale_sec: 2.0
    min_depth_m: 0.10
    max_depth_m: 2.00
    bbox_margin_px: 12
    min_target_points: 40
    depth_percentile_low: 30.0
    depth_band_m: 0.05
    voxel_size_m: 0.004
    stable_frames_required: 2
    lock_position_tol_m: 0.03
    log_interval_sec: 8.0

grasp_backend_node:
  ros__parameters:
    semantic_task_topic: "/qwen/semantic_task"
    target_cloud_topic: "/perception/target_cloud"
    candidate_grasp_proposal_array_topic: "/grasp/candidate_grasp_proposals"
    backend: "disabled"
    backend_url: ""
    request_timeout_sec: 10.0
    max_points: 2048
    min_points_required: 64
    publish_empty_on_failure: false
    default_task_constraint_tag: "pick"
    log_interval_sec: 8.0

sim_search_sweep_node:
  ros__parameters:
    trajectory_action_name: "/joint_trajectory_controller/follow_joint_trajectory"
    target_locked_topic: "/sim/perception/target_locked"
    pick_active_topic: "/sim/task/pick_active"
    candidate_visible_topic: "/sim/perception/target_candidate_visible"
    vision_result_topic: "/perception/detection_result"
    joint_state_topic: "/joint_states"
    search_pose_deg: [-87.0, -72.0, 89.0, 89.0, -90.0]
    scan_joint1_angles_deg: [-90.0, -84.0, -78.0, -72.0]
    startup_delay_sec: 4.0
    motion_duration_sec: 1.0
    settle_duration_sec: 0.5
    joint1_min_deg: -180.0
    joint1_max_deg: 180.0
    stop_after_first_lock: false
    enable_centering: true
    vision_result_stale_sec: 3.0
    horizontal_center_tolerance_px: 40.0
    vertical_center_tolerance_px: 32.0
    bbox_edge_margin_px: 36.0
    centering_hold_sec: 0.6
    centering_horizontal_gain_deg: 14.0
    centering_vertical_gain_deg: 10.0
    centering_max_joint1_step_deg: 10.0
    centering_max_vertical_step_deg: 6.0
    centering_min_step_deg: 1.0
    centering_horizontal_sign: 1.0
    centering_vertical_sign: 1.0
    prefer_bbox_center: true
    adaptive_centering_signs: false
    vertical_joint_index: 3
    vertical_joint_min_deg: 70.0
    vertical_joint_max_deg: 110.0
    target_session_lock_enabled: true
    target_session_match_distance_px: 120.0
    target_session_bbox_iou_threshold: 0.15
    target_session_timeout_sec: 12.0

sim_pick_task_node:
  ros__parameters:
    velocity_scaling: 1.0
    acceleration_scaling: 1.0
    gripper_velocity_scaling: 1.0
    gripper_acceleration_scaling: 1.0
    debug_stop_after_pregrasp: false
    debug_execute_ranked_candidates: false
    debug_ranked_candidate_limit: 12
    debug_return_named_target: "home"
    enforce_upright_orientation: true
    lock_joint_after_target_lock: false
    lock_joint_name: "arm_joint1"
    lock_joint_max_delta_deg: 180.0
    lock_joint_relaxed_delta_deg: 180.0
    lock_wrist_joint_after_target_lock: true
    wrist_joint_name: "arm_joint5"
    wrist_joint_max_delta_deg: 90.0
    wrist_joint_relaxed_delta_deg: 90.0
    camera_scoring_link: "camera_depth_optical_frame"
    camera_forward_alignment_threshold: 0.60
    camera_upright_alignment_threshold: 0.0
    camera_forward_penalty_weight: 10.0
    camera_upright_penalty_weight: 14.0
    camera_trajectory_tilt_penalty_weight: 10.0
    camera_flip_penalty_weight: 20.0
    camera_stable_tilt_reward_deg: 5.0
    camera_stable_reward_bonus: 2.5
    pregrasp_score_base: 30.0
    pregrasp_score_floor: 1.0
    plan_duration_penalty_weight: 1.8
    path_distance_penalty_weight: 6.0
    approach_distance_penalty_weight: 4.0
    primary_joint_delta_penalty_weight: 2.6
    wrist_joint_delta_penalty_weight: 0.0
    primary_joint_excursion_penalty_weight: 8.5
    secondary_joint_name: "arm_joint2"
    secondary_joint_excursion_penalty_weight: 0.0
    wrist_joint_excursion_penalty_weight: 0.0
    clearance_penalty_weight: 6.0
    grasp_base_roll_deg: 0.0
    grasp_base_pitch_deg: 90.0
    grasp_yaw_offset_deg: 0.0
    prefer_external_grasp_candidates: true
    require_external_grasp_candidates: false
    external_grasp_pose_timeout_sec: 3.5
    external_grasp_proposal_array_topic: "/grasp/candidate_grasp_proposals"
    execution_debug_markers_topic: "/grasp/execution_debug_markers"
    external_semantic_score_weight: 0.8
    external_confidence_score_weight: 0.6
    selected_pregrasp_pose_topic: "/grasp/selected_pregrasp_pose"
    selected_grasp_pose_topic: "/grasp/selected_grasp_pose"
    external_pregrasp_pose_array_topic: "/grasp/candidate_pregrasp_poses"
    external_grasp_pose_array_topic: "/grasp/candidate_grasp_poses"
