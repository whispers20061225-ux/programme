name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile key python files
        run: |
          python -m py_compile main.py
          python -m py_compile main_ros2.py
          python -m py_compile scripts/run_pybullet_gui.py
          python -m py_compile scripts/hand_eye_quick_calc.py
          python -m py_compile scripts/serial_ping_once.py
          python -m py_compile scripts/serial_ping_batch.py
          python -m py_compile examples/tactile_mapper_demo.py
          python -m py_compile src/core/ros2_data_acquisition.py
          python -m py_compile src/core/ros2_runtime_stubs.py
          python -m py_compile ros2_ws/src/tactile_hardware/tactile_hardware/legacy_runtime.py
          python -m py_compile ros2_ws/src/tactile_hardware/tactile_hardware/tactile_sensor_node.py
          python -m py_compile ros2_ws/src/tactile_hardware/tactile_hardware/arm_driver_node.py

      - name: Check required docs
        run: |
          test -f docs/ros2_refactor_plan.md
          test -f docs/github_code_architecture_style.md
          test -f docs/phase2_hardware_kickoff.md
